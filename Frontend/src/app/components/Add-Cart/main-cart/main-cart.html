<div class="cart-container" *ngIf="loggedInUser; else loading">
  
  <div *ngIf="isCartEmpty()">
    <app-empty-cart></app-empty-cart>
  </div>

  <div *ngIf="!isCartEmpty()" class="cart-summary-layout">
  <app-cart 
  [cartItems]="loggedInUser.cart"
  (increase)="onIncrease($event)"
  (decrease)="onDecrease($event)"
  (remove)="onRemoveFromCart($event)"
  (moveToWishlist)="moveToCart($event)">
</app-cart>
    
    <app-order-summary [cart]="loggedInUser.cart"></app-order-summary>
  </div>

  <hr class="section-divider" />

  <div class="wishlist-section">
    <app-wishlist 
      (moveToCart)="moveToCart($event)" 
      (remove)="removeFromWishlist($event)">
    </app-wishlist>
  </div>
</div>

<ng-template #loading>
  <div class="loading-spinner">
    <p>Loading your profile...</p>
  </div>
</ng-template>

<h3>My Wishlist ❤️</h3>

<div class="wishlist-container" *ngIf="items && items.length > 0">
  <div *ngFor="let item of items" class="wishlist-card">
    <h4>{{ item.name }}</h4>
    <p>Price: ₹{{ item.price }}</p>
    
    <div class="wishlist-actions">
      <button type="button" class="remove-btn" (click)="onRemove(item)">
  Remove
</button>
      <button type="button" class="cart-btn" (click)="onMoveToCart(item)">
  Move to Cart
</button>
    </div>
  </div>
</div>

<div *ngIf="!items || items.length === 0" class="empty-wishlist">
  <p>Your wishlist is empty</p>
</div>
